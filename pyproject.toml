[project]
name = "todo-app"
version = "0.1.0"
description = "A simple CLI-based TODO application"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "typer>=0.12.0",
]

[project.scripts]
todo = "todo.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/domain_models", "src/todo"]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.mypy]
explicit_package_bases = true
mypy_path = "."

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "pytest-mock>=3.15.1",
    "ruff>=0.15.20",
]

[tool.ruff]
force-exclude = true
exclude = [
    "src/domain_models/__init__.py",
    "src/domain_models/config.py",
    "src/domain_models/todo.py",
    "src/todo/__init__.py",
    "src/todo/cli.py",
    "src/todo/storage.py",
    "tests/e2e/__init__.py",
    "tests/e2e/test_cli.py",
    "tests/e2e/test_uat.py",
    "tests/e2e/test_uat_cycle02.py",
    "tests/test_uat_cycle01.py",
    "tests/test_uat_cycle02.py",
    "tests/unit/test_domain_models.py",
    "tests/unit/test_storage.py"
]
