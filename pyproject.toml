[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "todo-app"
version = "0.1.0"
description = "A simple CLI-based TODO application"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12.3",
    "pydantic>=2.7.4",
    "pydantic-settings>=2.14.2",
]

[project.scripts]
todo = "todo.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/todo", "src/domain_models"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 120

[tool.mypy]
python_version = "3.12"
explicit_package_bases = true
mypy_path = "src"
strict = true

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.20",
]
